<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テストゲーム</title>

<style>
body {
  margin:0;
  overflow:hidden;
  font-family:'Meiryo','Arial Rounded MT Bold','Hiragino Maru Gothic ProN',sans-serif;
}

/* =========================
   スタート画面
========================= */
#startScreen {
  position:absolute;
  width:100%;
  height:100%;
  overflow:hidden;
}

#startVideo {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ===== スタートボタン ===== */
#startBtn {
  position:absolute;
  left:25%;
  top:45%;
  transform:translate(-50%, -50%);
  font-size:min(5vw,32px);
  padding:2vw 5vw;

  background: linear-gradient(to bottom, #6f8cff, #5170ff);
  color:white;

  font-weight:900;
  border:none;
  border-radius:30px;

  cursor:pointer;
  box-shadow:0 6px 12px rgba(0,0,0,0.2);

  font-family:'Arial Rounded MT Bold','Hiragino Maru Gothic ProN','Comic Sans MS',sans-serif;

  overflow:hidden;
  transition: all 0.15s ease;
  z-index:2;
}

#startBtn::before {
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:50%;
  background:rgba(255,255,255,0.3);
  border-radius:30px 30px 0 0;
}

#startBtn:hover {
  transform: translate(-50%, -52%) scale(1.05);
}

#startBtn:active {
  transform: translate(-50%, -45%) scale(0.98);
}

/* =========================
   ゲーム画面
========================= */
#game {
  display:none;
  position:relative;
  width:100vw;
  height:100vh;
  background-size:cover;
  background-position:center;
}

/* ===== キャラ ===== */
#character {
  position:absolute;
  bottom:-10px;
  left:10%;
  width:35vw;
  height:35vw;
  max-width:330px;
  max-height:330px;
  background:url('char.png') no-repeat center/contain;
}

/* =========================
   問題エリア
========================= */
#problemBox {
  display:none;
  position:absolute;
  bottom:20vh;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
  color:white;
}

#problem {
  font-size:min(8vw, 90px);
  font-weight:1000;
  text-shadow:3px 3px 0 #2b2b2b;
  margin-bottom:4vh;
}

/* ===== 選択肢 ===== */
#choices {
  display:flex;
  justify-content:center;
  gap:3vw;
}

.choice {
  padding:1.5vw 2vw;
  font-size:min(3.5vw,35px);
  font-weight:900;
  background: linear-gradient(to bottom, #ffffff, #f2f2f2);
  border:none;
  border-radius:20px;
  cursor:pointer;
  box-shadow:0 6px 12px rgba(0,0,0,0.2);
  position:relative;
  overflow:hidden;
}

.choice.selected {
  background:#ffcc66;
}

/* ===== ボタン ===== */
#goBtn {
  margin-top:4vh;
  font-size:min(4vw,35px);
  padding:1.5vw 4vw;
  background: linear-gradient(to bottom, #ff6b6b, #ff3b3b);
  color:white;
  border:none;
  border-radius:30px;
  cursor:pointer;
}

/* ===== タイマー ===== */
#timer {
  margin-top:2vh;
  font-size:min(3.5vw,30px);
  font-weight:900;
}

/* ===== 揺れ ===== */
.shake {
  animation: shake 0.3s ease;
}

@keyframes shake {
  0%   { transform: translateX(-50%) translateX(0); }
  50%  { transform: translateX(-50%) translateX(10px); }
  100% { transform: translateX(-50%) translateX(0); }
}

/* ===== 正解 ===== */
.correctAnim {
  animation: correctOut 0.7s ease forwards;
}

@keyframes correctOut {
  0%   { transform: translateX(-50%) scale(1); }
  30%  { transform: translateX(-50%) scale(0.95); }
  45%  { transform: translateX(-50%) scale(0.95); }
  100% { transform: translateX(-50%) scale(0.95); visibility:hidden; }
}

/* ===== スマホ補正 ===== */
@media (max-width: 768px) {
  #problem { font-size:12vw; }
  .choice { font-size:6vw; }
  #goBtn { font-size:6vw; }
  #character { width:50vw; height:50vw; }
}
</style>
</head>

<body>

<div id="startScreen">
  <video id="startVideo" autoplay muted loop playsinline>
    <source src="start.mp4" type="video/mp4">
  </video>
  <button id="startBtn">スタート！</button>
</div>

<div id="game">
  <div id="character"></div>
  <div id="problemBox">
    <div id="problem"></div>
    <div id="choices"></div>
    <button id="goBtn">けってい！</button>
    <div id="timer"></div>
  </div>
</div>

<div id="loadingScreen">
  <video id="loadVideo" autoplay muted playsinline>
    <source src="load.mp4" type="video/mp4">
  </video>
</div>

<div id="fade"></div>

<script>
/* JSは一切変更していません */
</script>

</body>
</html>
